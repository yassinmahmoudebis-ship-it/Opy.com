<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OPY Clothing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    nav {
      text-align: center;
      margin-bottom: 20px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-size: 18px;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #aaa;
    }

    .products {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      text-align: center;
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      color: #ccc;
    }

    button {
      background: white;
      color: black;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<header>OPY</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Shop</a>
  <a href="#">Contact</a>
</nav>

<section class="hero">
  <h1>Welcome to OPY</h1>
  <p>Streetwear for the next generation</p>
</section>

<section class="products">
  <div class="card">
    <h3>Black Hoodie</h3>
    <p>$25</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>White T-Shirt</h3>
    <p>$15</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>OPY Cap</h3>
    <p>$10</p>
    <button>Buy Now</button>
  </div>
</section>

<footer>
  © 2026 OPY Clothing
</footer>

</body>
</html>
